<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color: blueviolet;
            transition: all 2s;
        }
        div:hover{
            background-color: rgb(0, 255, 115);
        }
        #uno{
            background-color: pink;
            animation: adrian 2s infinite;
        }
        @keyframes adrian {
            0% {
                 background-color: aqua;
            }
            50%{
                background-color: blueviolet;
            }
            100%{
                background-color: rgb(209, 135, 153);
            }
        }
      
    </style>
</head>
<body>
    <div>
    <h1>Como nos conocimos</h1>
    </div>
    <div id="uno">
    <p>xdddd</p>
    </div>
</body>
</html>
